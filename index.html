<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lumin Engenharia · Projetos e Instalações Elétricas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    :root {
      --orange: #FF6B1A;
      --orange-2: #FF8A3D;
      --orange-soft: #FFF0E6;
      --ink: #0F0F10;
      --ink-2: #4A4A4F;
      --ink-3: #7A7A80;
      --line: #E8E6E0;
      --paper: #FBF9F5;
      --paper-2: #FFFFFF;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    .serif { font-family: 'Instrument Serif', serif; font-weight: 400; letter-spacing: -0.01em; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: none; }

    .container { max-width: 1240px; margin: 0 auto; padding: 0 32px; }

    /* NAV */
    .nav { position: sticky; top: 0; z-index: 50; background: rgba(251,249,245,0.85); backdrop-filter: blur(14px); border-bottom: 1px solid rgba(0,0,0,0.04); }
    .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 72px; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-mark { width: 34px; height: 34px; border-radius: 8px; background: var(--ink); display: grid; place-items: center; position: relative; overflow: hidden; }
    .logo-mark::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 30% 30%, var(--orange) 0%, transparent 60%); }
    .logo-mark svg { position: relative; z-index: 1; }
    .logo-text { font-weight: 800; font-size: 18px; letter-spacing: -0.02em; }
    .logo-text span { color: var(--orange); }
    .logo-img { height: 36px; width: auto; display: block; }
    .nav-links { display: flex; gap: 36px; }
    .nav-links a { font-size: 14px; color: var(--ink-2); font-weight: 500; transition: color .15s; }
    .nav-links a:hover { color: var(--ink); }
    .nav-cta { padding: 10px 18px; background: var(--ink); color: #fff; border-radius: 999px; font-size: 13px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: transform .15s, background .15s; }
    .nav-cta:hover { background: var(--orange); transform: translateY(-1px); }

    /* HERO */
    .hero { padding: 100px 0 80px; position: relative; overflow: hidden; }
    .hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
    .eyebrow { display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px; background: var(--orange-soft); color: var(--orange); border-radius: 999px; font-size: 12px; font-weight: 600; letter-spacing: 0.02em; }
    .eyebrow-dot { width: 6px; height: 6px; background: var(--orange); border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    h1.hero-title { font-size: clamp(48px, 5.6vw, 88px); line-height: 0.95; letter-spacing: -0.04em; margin: 22px 0 24px; font-weight: 500; }
    h1.hero-title em { font-style: italic; color: var(--orange); font-family: 'Instrument Serif', serif; font-weight: 400; letter-spacing: -0.01em; }
    .hero-sub { font-size: 18px; line-height: 1.55; color: var(--ink-2); max-width: 480px; margin: 0 0 36px; }
    .cta-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .btn-primary { display: inline-flex; align-items: center; gap: 10px; padding: 16px 24px; background: var(--orange); color: #fff; border-radius: 999px; font-size: 15px; font-weight: 600; transition: transform .15s, box-shadow .2s; box-shadow: 0 8px 24px -8px rgba(255,107,26,0.5); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 14px 32px -8px rgba(255,107,26,0.6); }
    .btn-ghost { display: inline-flex; align-items: center; gap: 8px; padding: 16px 22px; color: var(--ink); border-radius: 999px; font-size: 15px; font-weight: 600; border: 1px solid var(--line); background: #fff; transition: border-color .15s; }
    .btn-ghost:hover { border-color: var(--ink); }

    .hero-visual { position: relative; aspect-ratio: 4 / 5; border-radius: 24px; overflow: hidden; background: #1a1a1a; }
    .hero-img { position: absolute; inset: 0; background-image: url('https://images.unsplash.com/photo-1581094794329-c8112a89af12?w=1200&q=80'); background-size: cover; background-position: center; }
    .hero-img::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.5)); }
    .hero-badge { position: absolute; top: 24px; left: 24px; padding: 10px 16px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 999px; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; }
    .hero-badge::before { content: ''; width: 8px; height: 8px; background: #22c55e; border-radius: 50%; }
    .hero-card-float { position: absolute; bottom: 24px; left: 24px; right: 24px; padding: 20px; background: rgba(255,255,255,0.96); backdrop-filter: blur(16px); border-radius: 16px; display: flex; align-items: center; gap: 16px; }
    .hero-card-float h4 { margin: 0 0 2px; font-size: 15px; font-weight: 700; }
    .hero-card-float p { margin: 0; font-size: 12px; color: var(--ink-3); }

    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 56px; padding-top: 40px; border-top: 1px solid var(--line); }
    .stat-num { font-family: 'Instrument Serif', serif; font-size: 52px; line-height: 1; color: var(--ink); letter-spacing: -0.02em; }
    .stat-num em { color: var(--orange); font-style: italic; }
    .stat-label { font-size: 13px; color: var(--ink-3); margin-top: 6px; max-width: 180px; line-height: 1.4; }

    /* SECTIONS */
    section { padding: 100px 0; }
    .section-head { max-width: 720px; margin-bottom: 60px; }
    .section-eyebrow { font-size: 12px; font-weight: 700; color: var(--orange); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 14px; }
    .section-title { font-size: clamp(36px, 4vw, 56px); line-height: 1.02; letter-spacing: -0.03em; font-weight: 500; margin: 0 0 20px; }
    .section-title em { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; color: var(--orange); }
    .section-desc { font-size: 17px; line-height: 1.55; color: var(--ink-2); margin: 0; }

    /* SERVICES */
    .services { background: var(--paper-2); border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
    .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--line); border: 1px solid var(--line); border-radius: 20px; overflow: hidden; }
    .svc-card { background: var(--paper-2); padding: 36px; transition: background .2s; cursor: pointer; position: relative; }
    .svc-card:hover { background: #FFFCF8; }
    .svc-card:hover .svc-arrow { background: var(--orange); color: #fff; transform: rotate(-45deg) translateX(2px); }
    .svc-icon { width: 48px; height: 48px; border-radius: 12px; background: var(--orange-soft); color: var(--orange); display: grid; place-items: center; margin-bottom: 24px; }
    .svc-title { font-size: 20px; font-weight: 700; letter-spacing: -0.01em; margin: 0 0 8px; }
    .svc-desc { font-size: 14px; color: var(--ink-2); line-height: 1.5; margin: 0; }
    .svc-arrow { position: absolute; top: 32px; right: 32px; width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--line); display: grid; place-items: center; transition: all .2s; }

    /* WHY */
    .why-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 60px; align-items: start; }
    .why-list { display: flex; flex-direction: column; gap: 4px; }
    .why-item { padding: 24px 0; border-bottom: 1px solid var(--line); display: grid; grid-template-columns: 40px 1fr 24px; gap: 16px; align-items: center; transition: padding-left .2s; cursor: pointer; }
    .why-item:hover { padding-left: 8px; }
    .why-num { font-family: 'Instrument Serif', serif; font-size: 24px; color: var(--orange); font-style: italic; }
    .why-text { font-size: 18px; font-weight: 500; letter-spacing: -0.01em; }
    .why-chev { color: var(--ink-3); }
    .why-visual { position: sticky; top: 100px; aspect-ratio: 3/4; border-radius: 20px; overflow: hidden; background-image: url('https://images.unsplash.com/photo-1497435334941-8c899ee9e8e9?w=1200&q=80'); background-size: cover; background-position: center; position: relative; }
    .why-visual::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.6)); }
    .why-visual-quote { position: absolute; bottom: 32px; left: 32px; right: 32px; color: #fff; font-family: 'Instrument Serif', serif; font-size: 28px; line-height: 1.2; font-style: italic; z-index: 1; }

    /* PORTFOLIO */
    .portfolio { background: var(--ink); color: #fff; padding: 120px 0; border-radius: 32px 32px 0 0; }
    .portfolio .section-title { color: #fff; }
    .portfolio .section-eyebrow { color: var(--orange-2); }
    .portfolio .section-desc { color: rgba(255,255,255,0.7); }
    .portfolio-filters { display: flex; gap: 8px; margin-bottom: 40px; flex-wrap: wrap; }
    .filter { padding: 10px 18px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.8); background: transparent; font-size: 13px; font-weight: 500; transition: all .15s; }
    .filter:hover { border-color: rgba(255,255,255,0.4); color: #fff; }
    .filter.active { background: var(--orange); border-color: var(--orange); color: #fff; }
    .portfolio-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 16px; }
    .work { grid-column: span 4; border-radius: 16px; overflow: hidden; background: #1c1c1d; position: relative; aspect-ratio: 4/5; cursor: pointer; transition: transform .25s; }
    .work:hover { transform: translateY(-4px); }
    .work.feature { grid-column: span 6; aspect-ratio: 4/3; }
    .work.tall { grid-column: span 4; aspect-ratio: 3/5; }
    .work-img { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0.8; transition: opacity .2s; }
    .work:hover .work-img { opacity: 1; }
    .work-img::after { content: ''; position: absolute; inset: 0; background: linear-gradient(0deg, rgba(0,0,0,0.85) 0%, transparent 60%); }
    .work-meta { position: absolute; bottom: 0; left: 0; right: 0; padding: 24px; }
    .work-cat { font-size: 11px; color: var(--orange-2); letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700; margin-bottom: 6px; }
    .work-title { font-size: 20px; font-weight: 700; letter-spacing: -0.01em; margin: 0 0 6px; line-height: 1.2; }
    .work-desc { font-size: 13px; color: rgba(255,255,255,0.7); margin: 0; line-height: 1.4; }
    .work-badge { position: absolute; top: 16px; right: 16px; padding: 6px 12px; background: rgba(255,255,255,0.12); backdrop-filter: blur(10px); border-radius: 999px; font-size: 11px; font-weight: 600; }

    /* ABOUT */
    .about { background: var(--paper); padding: 120px 0; }
    .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; }
    .about-title { font-size: clamp(40px, 4.5vw, 72px); line-height: 0.98; letter-spacing: -0.03em; font-weight: 500; margin: 0 0 32px; }
    .about-title em { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; color: var(--orange); }
    .about-body p { font-size: 16px; line-height: 1.65; color: var(--ink-2); margin: 0 0 20px; }
    .mvv { display: flex; flex-direction: column; gap: 14px; }
    .mvv-card { padding: 28px; background: #fff; border: 1px solid var(--line); border-radius: 16px; transition: border-color .15s, transform .15s; }
    .mvv-card:hover { border-color: var(--orange); transform: translateX(4px); }
    .mvv-label { font-size: 11px; font-weight: 700; color: var(--orange); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
    .mvv-label::before { content: ''; width: 24px; height: 1px; background: var(--orange); }
    .mvv-text { font-size: 16px; line-height: 1.55; color: var(--ink); font-weight: 500; letter-spacing: -0.01em; margin: 0; }

    /* CTA BAND */
    .cta-band { padding: 100px 0; background: var(--orange); color: #fff; position: relative; overflow: hidden; }
    .cta-band::before { content: ''; position: absolute; top: -200px; right: -200px; width: 600px; height: 600px; border-radius: 50%; background: var(--orange-2); opacity: 0.5; }
    .cta-inner { position: relative; display: grid; grid-template-columns: 1.3fr 1fr; gap: 60px; align-items: center; }
    .cta-title { font-size: clamp(40px, 4.5vw, 68px); line-height: 1; letter-spacing: -0.03em; font-weight: 500; margin: 0; color: #fff; }
    .cta-title em { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; color: #fff; }
    .cta-title .under { text-decoration: underline; text-decoration-thickness: 2px; text-underline-offset: 8px; }
    .cta-card { background: #fff; color: var(--ink); padding: 32px; border-radius: 20px; }
    .cta-card h3 { margin: 0 0 8px; font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
    .cta-card p { margin: 0 0 20px; font-size: 14px; color: var(--ink-2); line-height: 1.5; }
    .wa-btn { display: flex; align-items: center; gap: 12px; width: 100%; padding: 16px; background: #25D366; color: #fff; border-radius: 12px; font-size: 15px; font-weight: 700; justify-content: center; transition: transform .15s; }
    .wa-btn:hover { transform: translateY(-2px); }
    .cta-alt { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .cta-alt a { padding: 12px; text-align: center; border: 1px solid var(--line); border-radius: 10px; font-size: 13px; font-weight: 600; color: var(--ink-2); transition: border-color .15s; }
    .cta-alt a:hover { border-color: var(--ink); color: var(--ink); }

    /* FOOTER */
    footer { background: var(--paper-2); padding: 80px 0 32px; border-top: 1px solid var(--line); }
    .foot-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1.5fr; gap: 48px; margin-bottom: 60px; }
    .foot-brand p { font-size: 14px; color: var(--ink-2); line-height: 1.6; margin: 16px 0 0; max-width: 320px; }
    .foot-col h5 { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-3); margin: 0 0 16px; }
    .foot-col ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 12px; }
    .foot-col a { font-size: 14px; color: var(--ink); }
    .foot-col a:hover { color: var(--orange); }
    .foot-contact p { font-size: 14px; color: var(--ink-2); line-height: 1.55; margin: 0 0 8px; }
    .foot-contact a { color: var(--ink); font-weight: 600; }
    .foot-bottom { padding-top: 32px; border-top: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--ink-3); }

    /* FLOATING WA */
    .wa-float { position: fixed; bottom: 24px; right: 24px; width: 60px; height: 60px; border-radius: 50%; background: #25D366; color: #fff; display: grid; place-items: center; box-shadow: 0 10px 30px rgba(37,211,102,0.4); z-index: 40; transition: transform .2s; }
    .wa-float:hover { transform: scale(1.08); }

    /* TWEAKS PANEL */
    .tw-panel { position: fixed; top: 90px; right: 16px; width: 280px; background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 18px; font-size: 13px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); z-index: 60; }
    .tw-panel h4 { margin: 0 0 14px; font-size: 13px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink-3); }
    .tw-row { margin-bottom: 14px; }
    .tw-row label { display: block; font-size: 11px; color: var(--ink-3); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }
    .tw-swatches { display: flex; gap: 6px; }
    .tw-swatch { width: 28px; height: 28px; border-radius: 8px; border: 2px solid transparent; cursor: pointer; transition: transform .15s; }
    .tw-swatch.active { border-color: var(--ink); transform: scale(1.1); }
    .tw-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .tw-chip { padding: 6px 10px; border-radius: 999px; border: 1px solid var(--line); background: #fff; font-size: 11px; cursor: pointer; font-weight: 600; color: var(--ink-2); }
    .tw-chip.active { background: var(--ink); color: #fff; border-color: var(--ink); }

    @media (max-width: 900px) {
      .hero-grid, .why-grid, .about-grid, .cta-inner, .foot-grid { grid-template-columns: 1fr; }
      .services-grid { grid-template-columns: 1fr; }
      .portfolio-grid { grid-template-columns: 1fr; }
      .work, .work.feature, .work.tall { grid-column: span 1; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const WA_PHONE = '5512997138201';
    const WA_MSG = 'Olá! Gostaria de solicitar um orçamento com a Lumin Engenharia.';
    const waLink = `https://wa.me/${WA_PHONE}?text=${encodeURIComponent(WA_MSG)}`;
    const openWA = (e) => {
      if (e) e.preventDefault();
      try { (window.top || window).open(waLink, '_blank', 'noopener,noreferrer'); }
      catch (_) { window.location.href = waLink; }
    };

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accentColor": "#FF6B1A",
      "variant": "premium",
      "heroHeadline": "17 anos iluminando os projetos mais exigentes do Vale do Paraíba."
    }/*EDITMODE-END*/;

    const SWATCHES = [
      { color: '#FF6B1A', orange2: '#FF8A3D', soft: '#FFF0E6' },
      { color: '#E85D04', orange2: '#F48C06', soft: '#FDECD8' },
      { color: '#F97316', orange2: '#FB923C', soft: '#FFEDD5' },
      { color: '#D4492A', orange2: '#E56F4F', soft: '#FBE6DF' },
    ];

    function Nav() {
      return (
        <nav className="nav">
          <div className="container nav-inner">
            <a href="#" className="logo" onClick={(e) => { e.preventDefault(); window.scrollTo({ top: 0, behavior: 'smooth' }); }}>
              <img src="logo.png" alt="Lumin Engenharia" className="logo-img" />
            </a>
            <div className="nav-links">
              <a href="#services">Serviços</a>
              <a href="#why">Por que Lumin</a>
              <a href="#work">Obras</a>
              <a href="#about">Sobre</a>
              <a href="#contact">Contato</a>
            </div>
            <a href={waLink} target="_blank" className="nav-cta">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 00-8.5 15.2L2 22l4.9-1.3A10 10 0 1012 2zm5.2 14.2c-.2.6-1.2 1.2-1.8 1.3-.5.1-1 .1-1.6-.1-.4-.1-.9-.3-1.5-.6-2.7-1.1-4.4-3.8-4.5-4-.1-.2-1-1.4-1-2.6 0-1.3.7-1.9.9-2.2.2-.2.5-.3.7-.3h.5c.2 0 .4 0 .6.4l.8 1.9c.1.2.1.4 0 .6l-.3.4c-.1.2-.3.3-.1.6.2.3.7 1.2 1.6 1.9 1.1.9 2 1.2 2.3 1.3.3.1.4.1.6-.1.2-.2.7-.8.9-1.1.2-.3.4-.2.6-.1.2.1 1.5.7 1.8.9.3.2.4.2.5.4.1.1.1.9 0 1.4z"/></svg>
              Falar com especialista
            </a>
          </div>
        </nav>
      );
    }

    function Hero({ headline }) {
      return (
        <section className="hero">
          <div className="container hero-grid">
            <div>
              <span className="eyebrow"><span className="eyebrow-dot"></span>Atendendo o Vale do Paraíba desde 2010</span>
              <h1 className="hero-title">{headline.split(' ').slice(0,3).join(' ')} <em>{headline.split(' ').slice(3, 6).join(' ')}</em> {headline.split(' ').slice(6).join(' ')}</h1>
              <p className="hero-sub">Projetos e instalações elétricas, sistemas SPDA e hidráulica predial. Engenheiros em campo, vistoria diária e a melhor relação custo-benefício do mercado.</p>

    function App() {
      const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
      const [tweaksOn, setTweaksOn] = useState(false);

      useEffect(() => {
        const handler = (e) => {
          if (e.data?.type === '__activate_edit_mode') setTweaksOn(true);
          if (e.data?.type === '__deactivate_edit_mode') setTweaksOn(false);
        };
        window.addEventListener('message', handler);
        window.parent.postMessage({type: '__edit_mode_available'}, '*');

        // Intercept WhatsApp clicks — break out of iframe sandbox
        const clickHandler = (e) => {
          const a = e.target.closest('a[href^="https://wa.me"]');
          if (!a) return;
          e.preventDefault();
          const href = a.getAttribute('href');
          try { (window.top || window).open(href, '_blank', 'noopener,noreferrer'); }
          catch (_) { window.location.href = href; }
        };
        document.addEventListener('click', clickHandler);
        // apply initial accent
        const match = SWATCHES.find(s => s.color === tweaks.accentColor);
        if (match) {
          document.documentElement.style.setProperty('--orange', match.color);
          document.documentElement.style.setProperty('--orange-2', match.orange2);
          document.documentElement.style.setProperty('--orange-soft', match.soft);
        }
        return () => { window.removeEventListener('message', handler); document.removeEventListener('click', clickHandler); };
      }, []);

      return (
        <>
          <Nav />
          <Hero headline={tweaks.heroHeadline} />
          <Services />
          <Why />
          <Portfolio />
          <About />
          <CTABand />
          <Footer />

          <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksOn} />
